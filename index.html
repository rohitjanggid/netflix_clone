<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Netflix Clone</title>
</head>
<body>
    <header> 
        <div class="navbar-hero">
            <div class="navbar">
                <div class="logo">
                    <img src="images/logo.png" alt="logo">
                </div>
<!-- navbar -->
                <div class="nav-right">
                    <select>
                        <option selected>English</option>
                        <option>hindi</option>
                    </select>
                    <button>Sign In</button>
                </div>
            </div>
<!-- hero section -->
            <div class="hero">
                <div class="over-lay">
                </div>

                <div class="hero-content">
                    <div class="content-one">
                        <h1>Unlimited movies, shows, and more</h1>
                        <p>Starts at <i class="fa-solid fa-indian-rupee-sign"></i>149. Cancel at any time.</p>
                    </div>
                    <h3>Ready to watch? Enter your email to create or restart your membership.</h3>
                    <div class="content-sign-in">
                        <input type="text" placeholder="Email address">
                        <button>Get Started</button>
                    </div>
                </div>
                <div class="curve"></div>
            </div>
<!-- trending now section -->
            <section class="trending">
                <h4>Trending Now</h4>
                <div class="cards-container">
                    <!-- card 1 -->
                    <div class="card">
                        <img src="images/card1.webp" >
                        <span class="number">1</span>
                    </div>

                    <!-- card 2 -->
                    <div class="card">
                        <img src="images/card2.webp" >
                        <span class="number">2</span>
                    </div>

                    <!-- card 3 -->
                    <div class="card">
                        <img src="images/card3.webp" >
                        <span class="number">3</span>
                    </div>

                    <!-- card 4 -->
                    <div class="card">
                        <img src="images/card4.webp" >
                        <span class="number">4</span>
                    </div>

                    <!-- card 5 -->
                    <div class="card">
                        <img src="images/card5.webp" >
                        <span class="number">5</span>
                    </div>

                    <!-- card 6 -->
                    <div class="card">
                        <img src="images/card6.webp" >
                        <span class="number">6</span>
                    </div>

                    <!-- card 7 -->
                    <div class="card">
                        <img src="images/card7.webp" >
                        <span class="number">7</span>
                    </div>

                    <!-- card 8 -->
                    <div class="card">
                        <img src="images/card8.webp" >
                        <span class="number">8</span>
                    </div>

                    <!-- card 9 -->
                    <div class="card">
                        <img src="images/card9.webp" >
                        <span class="number">9</span>
                    </div>

                    <!-- card 10 -->
                    <div class="card">
                        <img src="images/card10.webp" >
                        <span class="number">10</span>
                    </div>
                </div>
<!-- more reason section -->
                <div class="more-reason">
                    <h4>More reason to join</h4>
                </div>
            </section>
        </div>
    </header>
</body>
</html>
